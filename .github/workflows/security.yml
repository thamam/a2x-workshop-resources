name: Security checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block private files
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/block-private-files.sh
          git ls-files -z | xargs -0 scripts/block-private-files.sh

      - name: Check static links
        shell: bash
        run: python3 scripts/check-static-links.py
